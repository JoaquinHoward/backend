<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient BMI Calculator</title>
</head>
<body>

    <table id="patient-table" border="1" style="background-color: green;">
        <thead>
            <td>name</td>
            <td>weight</td>
            <td>height</td>
        </thead>
    </table>

    <table id="underweight-table" border="1" style="background-color: blue;">
        <thead>
            <td>name</td>
            <td>weight</td>
            <td>height</td>
        </thead>
    </table>

    <table id="normal-table" border="1" style="background-color: pink;">
        <thead>
            <td>name</td>
            <td>weight</td>
            <td>height</td>
        </thead>
    </table>

    <table id="overweight-table" border="1" style="background-color: yellow;">
        <thead>
            <td>name</td>
            <td>weight</td>
            <td>height</td>
        </thead>
    </table>

    <table id="obese-table" border="1" style="background-color: brown;">
        <thead>
            <td>name</td>
            <td>weight</td>
            <td>height</td>
        </thead>
    </table>

    <table id="extremely-obese-table" border="1" style="background-color: beige;">
        <thead>
            <td>name</td>
            <td>weight</td>
            <td>height</td>
        </thead>
    </table>
    <script src="script.js"></script>
</body>
</html>
